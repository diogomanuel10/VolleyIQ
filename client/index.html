<!DOCTYPE html>
<html lang="pt-PT" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VolleyIQ" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <title>VolleyIQ — Volleyball Analytics</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      // Aplica o tema antes do React montar para evitar flash do tema errado.
      // Mantido em sync com client/src/lib/theme.ts (chave + classe).
      (function () {
        try {
          var stored = localStorage.getItem("volleyiq:theme");
          var system = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          var theme = stored === "light" || stored === "dark" ? stored : system;
          if (theme === "dark") document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = theme === "dark" ? "#0f172a" : "#ffffff";
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
