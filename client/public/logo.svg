<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Volleyball -->
  <circle cx="90" cy="88" r="72" fill="white" stroke="#0f2044" stroke-width="5.5"/>
  <!-- Seam: top horizontal arc -->
  <path d="M 32 62 Q 90 30 148 62" stroke="#0f2044" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Seam: bottom horizontal arc -->
  <path d="M 28 108 Q 90 145 152 108" stroke="#0f2044" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Seam: left vertical arc -->
  <path d="M 60 24 Q 22 88 60 150" stroke="#0f2044" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Seam: right vertical arc -->
  <path d="M 120 24 Q 158 88 120 150" stroke="#0f2044" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Bar chart (bottom-right overlapping ball) -->
  <rect x="70" y="124" width="22" height="38" rx="4" fill="#1a9ef5" stroke="#0f2044" stroke-width="3.5"/>
  <rect x="97" y="106" width="22" height="56" rx="4" fill="#1a9ef5" stroke="#0f2044" stroke-width="3.5"/>
  <rect x="124" y="87" width="22" height="75" rx="4" fill="#1a9ef5" stroke="#0f2044" stroke-width="3.5"/>

  <!-- Upward-right arrow -->
  <line x1="76" y1="116" x2="150" y2="72" stroke="#1a9ef5" stroke-width="7.5" stroke-linecap="round"/>
  <polyline points="127,62 150,72 141,95" stroke="#1a9ef5" stroke-width="7.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
